    Projects:
      - name: caveman_ros2
        url: https://github.com/stevens-armlab/caveman_ros2
        highlights:
          - Built a ROS 2 Jazzy and Gazebo Harmonic collaborative robotics simulation stack with Clearpath Husky, UR5 and UR5e manipulators, and a compliant caveman human model.
          - Added configurable dual-arm and single-arm operation and NASA hand end-effector customization through my_kortex platform extras.
          - Integrated multi.launch workflows for robot plus human simulation with optional human pose and pose_refiner nodes.
          - Established reproducible setup and build workflows with rosdep and colcon, including RealSense camera integration support.

      - name: teleop_touch3d_logger_ros2
        url: https://github.com/stevens-armlab/teleop_touch3d_logger_ros2
        highlights:
          - Developed ROS 2 teleoperation and logging utilities for Geomagic Touch haptic-device arm-control experiments.
          - Implemented configurable button mapping, haptic launch workflow, and NASA hand gripper command mode for multi-joint actuation.
          - Built labeled data collection tooling that records rosbag2 sessions with metadata grouped by grasped-link class labels.
          - Added observer dataset preparation tools to export synchronized depth samples and supervised CSV annotations for training pipelines.

      - name: casperjointpose
        url: https://github.com/stevens-armlab/casperjointpose
        highlights:
          - Implemented a depth-only human joint-state observer that predicts bounded joint-angle estimates and body-link label logits.
          - Added an energy-based feasible-state modeling and threshold calibration pipeline for extracting physically plausible joint-state sets.
          - Developed a ConvNeXt-style depth backbone with joint-query cross-attention, kinematic graph refinement, and optional temporal fusion.
          - Built staged training and evaluation workflows with reproducible split artifacts and SLURM ablation sweep support.

      - name: event_jackal
        url: https://github.com/gaudelbijay/event_jackal
        highlights:
          - Built an event-driven reinforcement learning navigation framework that uses neuromorphic event cameras and Binary Event Maps instead of dense frame or laser sensing.
          - Trained self-supervised contrastive perception embeddings and Soft Actor-Critic navigation policies across MLP, CNN, GRU, and Transformer agents.
          - Achieved simulation navigation performance comparable to laser-based systems under comparable scenarios.
          - Demonstrated transfer to a real Jackal UGV with minimal calibration, showing practical deployment potential for event-based perception.

      - name: pose_refiner
        url: https://github.com/stevens-armlab/pose_refiner
        highlights:
          - Built a calibration-free real-time 2D pose refinement pipeline using EKF filtering with confidence and outlier gating.
          - Enforced skeleton length and angle constraints to improve temporal consistency and robustness of human pose keypoints.
          - Integrated ROS 2 interfaces that publish refined pose and diagnostics topics, with optional annotated visualization output.
          - Added launch-time configurability for annotator toggling and runtime configuration reloading in simulation and robot workflows.

