    Projects:
      - name: Human Casualty Manipulation (Ongoing)
        url: https://github.com/stevens-armlab/caveman_ros2
        highlights:
          - Migrated and rebuilt a human casualty model from Gazebo Classic and ROS 1 to Gazebo Harmonic and ROS 2 with position and force-torque control across joints.
          - Fine-tuned a ViTPose-based human pose estimation model using approximately 500 custom annotated simulation images for casualty manipulation scenarios.
          - Developed a kinematics-based correction module using robot arm forward kinematics and contact constraints to stabilize pose estimates during manipulation.
          - Designing a mechanically safe policy learning framework with joint-level force-torque constraints to place the casualty model into a supine position.

      - name: Event-Camera-Based Autonomous Mobile Robot Navigation
        url: https://github.com/gaudelbijay/event_jackal
        highlights:
          - Designed an event-camera-based reinforcement learning framework integrating asynchronous event perception with policy learning.
          - Built an event processing pipeline that converts raw event streams into structured representations for comparison across neural architectures and sensing modalities.
          - Conducted comparative simulation studies of event-based and laser-based navigation, showing competitive performance with key temporal stability tradeoffs.
          - Evaluated policies on a physical ground robot and identified sim-to-real performance gaps tied to event-camera modeling and environment realism.

      - name: Adversarial Attacker and Generative Defender
        url: https://github.com/gaudelbijay/diffusion-defender
        highlights:
          - Built an RL-based adversarial attacker for stealth attacks on perception-based navigation with a 60% success rate in stochastic environments.
          - Developed a diffusion-model-based defender for autonomous vehicles.
          - Demonstrated that diffusion denoising can dynamically remove perturbation noise across attacker algorithms.
          - Experimental tests showed diffusion denoising reduces the effectiveness of reinforcement-learning-based attacks.

      - name: NepaliAutoCompleteAndLM
        url: https://github.com/gaudelbijay/NepaliAutoCompleteAndLM
        highlights:
          - Built a PyTorch-based deep learning framework for Nepali word suggestion during writing.
          - Trained recurrent neural network models with GRU or LSTM layers and KL-divergence loss.

